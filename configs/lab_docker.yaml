network:
  target_ranges:
    - "192.168.100.0/24"
  excluded_ips:
    - "192.168.100.1"
  scan_timeout: 3
  max_threads: 30
  ports_to_scan:
    - 21    # FTP
    - 22    # SSH
    - 80    # HTTP
    - 443   # HTTPS
    - 1433  # MSSQL
    - 3306  # MySQL
    - 5432  # PostgreSQL
    - 5672  # RabbitMQ
    - 6379  # Redis
    - 8080  # Jenkins/HTTP-alt
    - 8082  # Juice Shop
    - 9200  # Elasticsearch
    - 15672 # RabbitMQ Management
    - 27017 # MongoDB

exploit:
  max_exploit_attempts: 2
  exploit_timeout: 20
  use_credentials: true
  credential_wordlist: "wordlists/common_creds.txt"
  enable_smb: false
  enable_ssh: true
  enable_web: true
  enable_password_spray: true
  spray_delay: 0.5
  lockout_threshold: 10
  enable_credential_pivoting: true

propagation:
  max_infections: 20
  propagation_delay: 1.0
  persistence_enabled: false
  self_replicate: false
  mutation_enabled: true

evasion:
  stealth_mode: false
  randomize_timing: false
  detect_honeypots: false
  detect_ids: false
  encrypt_traffic: false
  max_scan_rate: 500

c2:
  c2_server: "127.0.0.1"
  c2_port: 8443
  beacon_interval: 30
  use_encryption: false

ml:
  use_pretrained: false
  online_learning: true

safety:
  kill_switch_enabled: true
  kill_switch_code: "EMERGENCY_STOP_2024"
  auto_destruct_time: 0
  geofence_enabled: true
  allowed_networks:
    - "192.168.100.0/24"
    - "192.168.0.0/16"
    - "10.0.0.0/8"
  max_runtime_hours: 1
  enable_logging: true
  log_encryption: false
