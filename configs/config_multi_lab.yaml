# Multi-Lab Testing Configuration
# Scans all lab networks

network:
  target_ranges:
    - "192.168.100.0/24"    # Main lab network
  excluded_ips:
    - "192.168.100.1"       # Gateway
  scan_timeout: 2
  max_threads: 100
  ports_to_scan:
    - 22    # SSH
    - 80    # HTTP
    - 443   # HTTPS
    - 445   # SMB
    - 3306  # MySQL
    - 5432  # PostgreSQL
    - 6379  # Redis
    - 8080  # HTTP-Alt
    - 27017 # MongoDB

exploit:
  max_exploit_attempts: 5
  exploit_timeout: 10
  use_credentials: true
  credential_wordlist: "wordlists/common_creds.txt"
  enable_smb: true
  enable_ssh: true
  enable_web: true

propagation:
  max_infections: 20
  propagation_delay: 0.3
  persistence_enabled: true
  self_replicate: false

evasion:
  stealth_mode: true
  randomize_timing: true
  detect_honeypots: true

c2:
  c2_server: "127.0.0.1"
  c2_port: 8443
  beacon_interval: 30

ml:
  use_pretrained: false
  online_learning: true

safety:
  kill_switch_enabled: true
  kill_switch_code: "LAB_TEST_STOP"
  auto_destruct_time: 2
  geofence_enabled: true
  allowed_networks:
    - "192.168.100.0/24"
  max_runtime_hours: 3