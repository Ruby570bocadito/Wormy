# Configuration for Testing Environment - Localhost Edition
# Escanea localhost donde están los servicios simulados

network:
  target_ranges:
    - "127.0.0.1/32"         # localhost
  excluded_ips: []
  scan_timeout: 2
  max_threads: 20
  ports_to_scan:
    - 22    # SSH
    - 21    # FTP
    - 23    # Telnet
    - 80    # HTTP
    - 443   # HTTPS
    - 445   # SMB
    - 3306  # MySQL
    - 3389  # RDP
    - 5432  # PostgreSQL
    - 6379  # Redis
    - 8080  # HTTP-Alt
    - 2323  # Telnet-Alt
    - 27017 # MongoDB

exploit:
  max_exploit_attempts: 3
  exploit_timeout: 10
  use_credentials: true
  credential_wordlist: "wordlists/common_creds.txt"
  enable_smb: true
  enable_ssh: true
  enable_web: true

propagation:
  max_infections: 5
  propagation_delay: 0.5
  persistence_enabled: false
  self_replicate: false
  mutation_enabled: false

evasion:
  stealth_mode: false
  randomize_timing: false
  detect_honeypots: false
  detect_ids: false
  encrypt_traffic: false
  max_scan_rate: 100

c2:
  c2_server: "127.0.0.1"
  c2_port: 8443
  beacon_interval: 30
  use_encryption: false

ml:
  use_pretrained: false
  online_learning: false

safety:
  kill_switch_enabled: true
  kill_switch_code: "TEST_STOP"
  auto_destruct_time: 1
  geofence_enabled: true
  allowed_networks:
    - "127.0.0.0/8"      # localhost
    - "192.168.0.0/16"   # local network
    - "10.0.0.0/8"       # private network
  max_runtime_hours: 1
  enable_logging: true
  log_encryption: false