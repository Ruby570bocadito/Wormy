# Wormy ML Network Worm - Docker Lab
# Complete vulnerable environment for safe testing
#
# Usage:
#   docker-compose up -d
#   docker-compose ps
#   docker-compose down

version: '3.8'

services:
  # === VULNERABLE WEB APPS ===
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: wormy-dvwa
    ports:
      - "8080:80"
    environment:
      - DB_PASSWORD=password
    networks:
      wormy-net:
        ipv4_address: 172.20.0.10

  webgoat:
    image: webgoat/webgoat:latest
    container_name: wormy-webgoat
    ports:
      - "8081:8080"
    networks:
      wormy-net:
        ipv4_address: 172.20.0.11

  mutillidae:
    image: citizenstig/nowasp:latest
    container_name: wormy-mutillidae
    ports:
      - "8082:80"
    networks:
      wormy-net:
        ipv4_address: 172.20.0.12

  # === VULNERABLE DATABASES ===
  mysql-vuln:
    image: mysql:5.7
    container_name: wormy-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=admin
    networks:
      wormy-net:
        ipv4_address: 172.20.0.20

  postgres-vuln:
    image: postgres:12
    container_name: wormy-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=testdb
    networks:
      wormy-net:
        ipv4_address: 172.20.0.21

  mongo-vuln:
    image: mongo:4.4
    container_name: wormy-mongo
    ports:
      - "27017:27017"
    command: mongod --noauth
    networks:
      wormy-net:
        ipv4_address: 172.20.0.22

  redis-vuln:
    image: redis:6-alpine
    container_name: wormy-redis
    ports:
      - "6379:6379"
    command: redis-server --protected-mode no
    networks:
      wormy-net:
        ipv4_address: 172.20.0.23

  elasticsearch-vuln:
    image: elasticsearch:7.10.0
    container_name: wormy-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    networks:
      wormy-net:
        ipv4_address: 172.20.0.24

  # === VULNERABLE SERVICES ===
  ftp-vuln:
    image: stilliard/pure-ftpd:latest
    container_name: wormy-ftp
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      - FTP_USER_NAME=ftpuser
      - FTP_USER_PASS=ftpuser
      - FTP_USER_HOME=/home/ftpuser
    networks:
      wormy-net:
        ipv4_address: 172.20.0.30

  ssh-vuln:
    image: linuxserver/openssh-server:latest
    container_name: wormy-ssh
    ports:
      - "2222:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - USER_PASSWORD=password
      - USER_NAME=admin
      - SUDO_ACCESS=true
    networks:
      wormy-net:
        ipv4_address: 172.20.0.31

  # === METASPLOITABLE ===
  metasploitable:
    image: tleemcjr/metasploitable2:latest
    container_name: wormy-metasploitable
    ports:
      - "2121:21"
      - "2222:22"
      - "2323:23"
      - "2525:25"
      - "5353:53"
      - "8080:80"
      - "1111:111"
      - "1391:139"
      - "4451:445"
      - "33061:3306"
      - "54321:5432"
      - "59001:5900"
      - "66671:6667"
      - "81801:8180"
    networks:
      wormy-net:
        ipv4_address: 172.20.0.100

  # === ATTACKER MACHINE ===
  attacker:
    image: kalilinux/kali-rolling:latest
    container_name: wormy-attacker
    command: tail -f /dev/null
    volumes:
      - .:/opt/wormy
    networks:
      wormy-net:
        ipv4_address: 172.20.0.200

networks:
  wormy-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
