name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          find . -name "*.py" -type f -exec python3 -m py_compile {} \;
          echo "All files compile successfully"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m pytest tests/test_unit.py -v --tb=short || true
      - name: Run academic tests
        run: |
          python -m pytest tests/test_academic.py -v --tb=short || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify worm_core imports
        run: python3 -c "import sys; sys.path.insert(0, '.'); from configs.config import Config; print('Config: OK')"
      - name: Verify wordlists
        run: |
          test -f wordlists/common_creds.txt && echo "common_creds.txt: OK"
          test -f wordlists/ssh_creds.txt && echo "ssh_creds.txt: OK"
          test -f wordlists/passwords.txt && echo "passwords.txt: OK"
          test -f wordlists/usernames.txt && echo "usernames.txt: OK"
